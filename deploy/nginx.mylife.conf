# ════════════════════════════════════════════════════════════════════
#  Nginx — mylife.dubiprinci.fr
#  Emplacement sur le serveur :
#    /etc/nginx/sites-available/mylife.dubiprinci.fr
#  Activer avec :
#    sudo ln -s /etc/nginx/sites-available/mylife.dubiprinci.fr \
#               /etc/nginx/sites-enabled/mylife.dubiprinci.fr
#    sudo nginx -t && sudo systemctl reload nginx
# ════════════════════════════════════════════════════════════════════

# ── Redirection HTTP → HTTPS ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mylife.dubiprinci.fr;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mylife.dubiprinci.fr;

    # Certificat Let's Encrypt (généré via : sudo certbot --nginx -d mylife.dubiprinci.fr)
    ssl_certificate     /etc/letsencrypt/live/mylife.dubiprinci.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mylife.dubiprinci.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Taille max pour les uploads (photos / vidéos)
    client_max_body_size 200M;

    # Dossier du frontend (build Vite)
    root  /var/www/mylife.dubiprinci.fr/html;
    index index.html;

    # ── Frontend SPA ──────────────────────────────────────────────
    # Renvoie index.html pour toutes les routes React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Node.js ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout généreux pour les gros uploads
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;
    }

    # ── Uploads (auth JWT vérifiée côté Node.js) ─────────────────
    # NE PAS servir en statique : l'accès est protégé par un middleware JWT
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Sécurité basique ──────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Cache pour les assets Vite (hash dans le nom de fichier)
    location ~* \.(?:js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
